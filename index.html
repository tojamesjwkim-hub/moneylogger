<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logger</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: Arial, sans-serif; color: #000; display: flex; flex-direction: column; min-height: 100%; user-select: none; -webkit-user-select: none; position: relative; background: #fff; }
  #bg { position: fixed; inset: 0; z-index: -1; background-color: #fff; background-size: cover; background-position: center; pointer-events: none; }

  .numbers { border-bottom: 1px solid #000; padding: 14px 16px; flex: 0 0 auto; position: relative; }
  .total-label { font-size: 12px; margin-bottom: 4px; }
  .total { font-size: 44px; font-weight: bold; line-height: 1; }
  .gear { position: absolute; top: 12px; right: 14px; width: 30px; height: 30px; border: 1px solid #000; background: rgba(255,255,255,.7); font-size: 16px; line-height: 28px; text-align: center; cursor: pointer; }

  .grouplabel { font-size: 11px; font-weight: bold; margin: 14px 0 6px; letter-spacing: .5px; }
  .slots { display: flex; flex-direction: column; gap: 10px; }
  .slot { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .slot input.name { font-family: Arial, sans-serif; font-size: 12px; width: 80px; border: none; border-bottom: 1px solid #000; padding: 2px 0; background: transparent; }
  .slot .op { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; width: 26px; height: 24px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; }
  .slot input.amt { font-family: Arial, sans-serif; font-size: 12px; width: 50px; border: 1px solid #000; padding: 2px 4px; background: rgba(255,255,255,.6); }
  .slot .val { font-size: 20px; font-weight: bold; margin-left: auto; }
  .slot .rm { font-family: Arial, sans-serif; font-size: 14px; width: 24px; height: 24px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; }
  .addslot { font-family: Arial, sans-serif; font-size: 12px; padding: 5px 10px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; margin-top: 8px; }

  .wheel-area { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; touch-action: none; padding: 18px 0; min-height: 220px; }
  .current { font-size: 72px; font-weight: bold; line-height: 1; margin-bottom: 4px; }
  .current::before { content: "$"; font-size: 36px; vertical-align: top; }
  .hint { font-size: 12px; margin-bottom: 16px; }
  .ruler { width: 100%; height: 70px; position: relative; overflow: hidden; border-top: 1px solid #000; border-bottom: 1px solid #000; touch-action: none; background: rgba(255,255,255,.45); }
  .ruler canvas { display: block; width: 100%; height: 100%; }
  .center-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #000; transform: translateX(-0.5px); }
  .center-tri { position: absolute; left: 50%; top: 0; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 7px solid #000; transform: translateX(-6px); }

  .notebox { flex: 0 0 auto; border-top: 1px solid #000; }
  .notebox input { width: 100%; font-family: Arial, sans-serif; font-size: 15px; border: none; padding: 12px 16px; background: rgba(255,255,255,.55); }

  .actions { display: flex; flex: 0 0 auto; }
  .logbtn { flex: 1 1 auto; border: none; border-top: 1px solid #000; background: #000; color: #fff; font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; padding: 20px; cursor: pointer; }
  .logbtn:active { background: #444; }
  .typebtn { flex: 0 0 auto; border: none; border-top: 1px solid #000; border-left: 1px solid #fff; background: #000; color: #fff; font-family: Arial, sans-serif; font-size: 13px; padding: 0 18px; cursor: pointer; }
  .typebtn:active { background: #444; }

  .recent { flex: 0 0 auto; border-top: 1px solid #000; max-height: 30vh; overflow-y: auto; background: rgba(255,255,255,.4); }
  .recent .rhead { display: flex; justify-content: space-between; padding: 8px 16px; font-size: 11px; font-weight: bold; background: rgba(243,243,243,.85); border-bottom: 1px solid #ccc; }
  .recent .rhead span { cursor: pointer; text-decoration: underline; }
  .recent .row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid #ccc; font-size: 14px; }
  .recent .row .amt { font-weight: bold; cursor: pointer; min-width: 44px; }
  .recent .row .note { flex: 1 1 auto; color: #333; cursor: pointer; font-size: 13px; }
  .recent .row .note.empty { color: #aaa; }
  .recent .row .time { font-size: 11px; color: #888; }
  .recent .row .x { padding: 0 4px; cursor: pointer; text-decoration: underline; font-size: 12px; }
  .recent .empty { padding: 12px 16px; font-size: 13px; color: #555; }

  .collapser { flex: 0 0 auto; border-top: 1px solid #000; background: rgba(255,255,255,.35); }
  .collapser > .head { padding: 12px 16px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
  .collapser .cbody { display: none; padding: 0 16px 14px; }
  .collapser.open .cbody { display: block; }

  .grp-title { font-size: 12px; font-weight: bold; margin: 12px 0 4px; }
  .hrow { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid #eee; }
  .tools { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .tools button { font-family: Arial, sans-serif; font-size: 12px; padding: 6px 10px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; }

  .flash { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: #000; color: #fff; font-size: 18px; font-weight: bold; padding: 10px 18px; opacity: 0; pointer-events: none; }
  .flash.show { opacity: 1; }

  .reminder { flex: 0 0 auto; display: none; align-items: center; gap: 10px; padding: 10px 16px; background: #fffbe6; border-bottom: 1px solid #000; font-size: 13px; }
  .reminder.show { display: flex; }
  .reminder span { flex: 1 1 auto; }
  .reminder button { font-family: Arial, sans-serif; font-size: 12px; padding: 5px 10px; border: 1px solid #000; background: #fff; cursor: pointer; }
  .reminder .rdismiss { border: none; background: transparent; text-decoration: underline; padding: 5px 4px; }

  .panel { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 10; }
  .panel.open { display: flex; }
  .panel .card { background: #fff; width: 90%; max-width: 360px; border: 1px solid #000; padding: 16px; }
  .panel h3 { font-size: 15px; margin-bottom: 12px; }
  .panel label { font-size: 12px; display: block; margin: 12px 0 4px; font-weight: bold; }
  .panel input[type=text] { width: 100%; font-family: Arial, sans-serif; font-size: 13px; border: 1px solid #000; padding: 6px; }
  .panel input[type=color] { width: 48px; height: 32px; border: 1px solid #000; padding: 0; background: #fff; vertical-align: middle; }
  .panel input[type=range] { width: 100%; }
  .panel .swatches { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .panel .swatch { width: 28px; height: 28px; border: 1px solid #000; cursor: pointer; }
  .panel .prow { display: flex; gap: 8px; margin-top: 14px; }
  .panel .prow button { flex: 1 1 auto; font-family: Arial, sans-serif; font-size: 13px; padding: 9px; border: 1px solid #000; background: #fff; cursor: pointer; }
  .panel .prow button.primary { background: #000; color: #fff; }
  .panel .note-sm { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.4; }
  .panel .rndbtn { font-family: Arial, sans-serif; font-size: 12px; padding: 5px 8px; border: 1px solid #000; background: #fff; cursor: pointer; margin-top: 6px; }
</style>
</head>
<body>
  <div id="bg"></div>

  <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none">

  <div class="reminder" id="reminder">
    <span id="reminderText">It's been a while since your last backup.</span>
    <button id="reminderExport">Export now</button>
    <button class="rdismiss" id="reminderDismiss">later</button>
  </div>

  <div class="numbers">
    <div class="gear" id="gear">&#9881;</div>
    <div class="total-label">TOTAL FOR TODAY</div>
    <div class="total" id="total">$0</div>
    <div class="grouplabel">PINNED</div>
    <div class="slots" id="slotsTop"></div>
    <button class="addslot" id="addTop">+ add number</button>
  </div>

  <div class="wheel-area">
    <div class="current" id="current">10</div>
    <div class="hint">drag the strip &middot; release to set</div>
    <div class="ruler" id="ruler">
      <canvas id="canvas"></canvas>
      <div class="center-line"></div>
      <div class="center-tri"></div>
    </div>
    <div class="flash" id="flash">logged</div>
  </div>

  <div class="notebox">
    <input id="note" type="text" placeholder="note (optional) - e.g. for friend">
  </div>

  <div class="actions">
    <button class="logbtn" id="logbtn">LOG &nbsp;$<span id="btnval">10</span></button>
    <button class="typebtn" id="typebtn">type</button>
  </div>

  <div class="recent" id="recent"></div>

  <div class="collapser" id="extra">
    <div class="head" id="extraHead"><span>More numbers</span><span id="extraChev">show</span></div>
    <div class="cbody">
      <div class="slots" id="slotsExtra"></div>
      <button class="addslot" id="addExtra">+ add number</button>
    </div>
  </div>

  <div class="collapser" id="history">
    <div class="head" id="historyHead"><span>History (day &amp; week)</span><span id="histChev">show</span></div>
    <div class="cbody" id="historyBody"></div>
  </div>

  <div class="panel" id="panel">
    <div class="card">
      <h3>Background</h3>
      <label>Color</label>
      <input type="color" id="bgColor" value="#ffffff">
      <div class="swatches" id="swatches"></div>
      <label>Or image URL</label>
      <input type="text" id="bgUrl" placeholder="https://images.unsplash.com/...">
      <button class="rndbtn" id="rndImg">random Unsplash image</button>
      <button class="rndbtn" id="uploadImg">upload image from device</button>
      <input type="file" id="bgFile" accept="image/*" style="display:none">
      <label>Opacity <span id="opVal">12%</span></label>
      <input type="range" id="bgOpacity" min="0" max="100" value="12">
      <div class="note-sm">Image URLs must be direct links (images.unsplash.com/... or ending in .jpg/.png). A regular unsplash.com page link won't show.</div>
      <div class="prow">
        <button id="bgClear">Clear</button>
        <button class="primary" id="bgDone">Done</button>
      </div>
    </div>
  </div>

<script>
(function () {
  // ===== CHANGE THIS PER COPY: a short label that keeps each logger's data separate =====
  var APP_ID = 'logger2';
  // =====================================================================================

  var mem = {};
  function k(key){ return APP_ID + ':' + key; }
  function store(key, val) {
    try { if (val === undefined) { return localStorage.getItem(k(key)); } localStorage.setItem(k(key), val); }
    catch (e) { if (val === undefined) return (k(key) in mem) ? mem[k(key)] : null; mem[k(key)] = val; }
  }
  function loadJSON(key, dflt) { var v = store(key); if (v == null) return dflt; try { return JSON.parse(v); } catch (e) { return dflt; } }
  function saveJSON(key, obj) { store(key, JSON.stringify(obj)); }

  var entries = loadJSON('entries', []);
  var slotsTop = loadJSON('slotsTop', [ { name: 'after rent', op: '-', amt: 20 } ]);
  var slotsExtra = loadJSON('slotsExtra', [ { name: 'budget', op: '-', amt: 100 }, { name: 'plus cash', op: '+', amt: 0 } ]);
  var bg = loadJSON('bg', { type: 'color', color: '#ffffff', url: '', opacity: 12 });
  var showAll = false;

  function startOfToday() { var d = new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  function todayTotal() { var s = startOfToday(); return entries.reduce(function (sum, e) { return e.ts >= s ? sum + e.amount : sum; }, 0); }

  // ---- background ----
  var bgEl = document.getElementById('bg');
  function applyBg() {
    var op = bg.opacity / 100;
    if (bg.type === 'image' && bg.url) {
      bgEl.style.backgroundColor = '#fff';
      bgEl.style.backgroundImage = 'url("' + bg.url + '")';
      bgEl.style.opacity = op;
    } else {
      bgEl.style.backgroundImage = 'none';
      bgEl.style.opacity = 1;
      var c = bg.color || '#ffffff';
      bgEl.style.backgroundColor = mixWhite(c, op);
    }
  }
  function mixWhite(hex, op) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.round(255 + (r-255)*op); g = Math.round(255 + (g-255)*op); b = Math.round(255 + (b-255)*op);
    return 'rgb('+r+','+g+','+b+')';
  }

  // ---- panel ----
  var panel = document.getElementById('panel');
  var bgColor = document.getElementById('bgColor');
  var bgUrl = document.getElementById('bgUrl');
  var bgOpacity = document.getElementById('bgOpacity');
  var opVal = document.getElementById('opVal');
  function openPanel() {
    bgColor.value = (bg.color && bg.color[0]==='#') ? bg.color : '#ffffff';
    bgUrl.value = (bg.url && bg.url.indexOf('data:')===0) ? '(uploaded image)' : (bg.url || '');
    bgOpacity.value = bg.opacity; opVal.textContent = bg.opacity + '%';
    panel.classList.add('open');
  }
  document.getElementById('gear').addEventListener('click', openPanel);
  bgColor.addEventListener('input', function(){ bg.type='color'; bg.color=bgColor.value; bg.url=''; bgUrl.value=''; applyBg(); });
  bgUrl.addEventListener('input', function(){ var v=bgUrl.value.trim(); if (v && v!=='(uploaded image)') { bg.type='image'; bg.url=v; } applyBg(); });
  bgOpacity.addEventListener('input', function(){ bg.opacity=parseInt(bgOpacity.value); opVal.textContent=bg.opacity+'%'; applyBg(); });
  document.getElementById('rndImg').addEventListener('click', function(){
    var topics = ['nature','water','paper','sky','texture','minimal','pastel'];
    var t = topics[Math.floor(Math.random()*topics.length)];
    bg.type='image'; bg.url='https://source.unsplash.com/random/800x1200/?'+t+'&sig='+Date.now();
    bgUrl.value=bg.url; applyBg();
  });
  document.getElementById('uploadImg').addEventListener('click', function(){ document.getElementById('bgFile').click(); });
  document.getElementById('bgFile').addEventListener('change', function(e){
    var f=e.target.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=function(){
      var img=new Image();
      img.onload=function(){
        var maxW=720, scale=Math.min(1, maxW/img.width);
        var w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        var dataUrl;
        try { dataUrl=cv.toDataURL('image/jpeg',0.7); } catch(err){ alert('Could not process that image.'); return; }
        bg.type='image'; bg.url=dataUrl; bgUrl.value='(uploaded image)';
        try { saveJSON('bg', bg); } catch(err){ alert('Image too large to save. Try a smaller photo.'); }
        applyBg();
      };
      img.onerror=function(){ alert('That file is not a readable image.'); };
      img.src=String(reader.result);
    };
    reader.readAsDataURL(f);
    e.target.value='';
  });
  var swColors = ['#ffd6d6','#ffe9c7','#fff7c7','#d6f5d6','#d6ecff','#e3d6ff','#ffd6f0','#e8e8e8'];
  var swEl = document.getElementById('swatches');
  swColors.forEach(function(c){ var d=document.createElement('div'); d.className='swatch'; d.style.background=c; d.addEventListener('click', function(){ bg.type='color'; bg.color=c; bg.url=''; bgUrl.value=''; bgColor.value=c; applyBg(); }); swEl.appendChild(d); });
  document.getElementById('bgClear').addEventListener('click', function(){ bg={type:'color',color:'#ffffff',url:'',opacity:12}; bgColor.value='#ffffff'; bgUrl.value=''; bgOpacity.value=12; opVal.textContent='12%'; applyBg(); });
  document.getElementById('bgDone').addEventListener('click', function(){ saveJSON('bg', bg); panel.classList.remove('open'); });
  panel.addEventListener('click', function(e){ if (e.target===panel) { saveJSON('bg', bg); panel.classList.remove('open'); } });

  // ---- wheel ----
  var MIN = 0, MAX = 200, value = 10, PX = 14;
  var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
  var ruler = document.getElementById('ruler');
  var W=0,H=0,dpr=window.devicePixelRatio||1;
  function sizeCanvas(){ var r=ruler.getBoundingClientRect(); W=r.width; H=r.height; canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); drawRuler(); }
  function drawRuler(){ ctx.clearRect(0,0,W,H); ctx.font='11px Arial'; ctx.textAlign='center'; ctx.fillStyle='#000'; ctx.strokeStyle='#000'; var cx=W/2;
    for (var v=MIN; v<=MAX; v++){ var x=cx+(v-value)*PX; if(x<-20||x>W+20) continue; var major=v%10===0, mid=v%5===0; var tickH=major?22:(mid?14:8); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,tickH); ctx.stroke(); if(major) ctx.fillText(v,x,38); } }
  var current=document.getElementById('current'), btnval=document.getElementById('btnval');
  function setValue(v){ value=Math.max(MIN,Math.min(MAX,Math.round(v))); current.textContent=value; btnval.textContent=value; drawRuler(); }
  var dragging=false, startX=0, startVal=0;
  function dStart(x){ dragging=true; startX=x; startVal=value; }
  function dMove(x){ if(!dragging) return; setValue(startVal-(x-startX)/PX); }
  function dEnd(){ dragging=false; }
  ruler.addEventListener('touchstart', function(e){ dStart(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  ruler.addEventListener('touchmove', function(e){ dMove(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  ruler.addEventListener('touchend', dEnd);
  ruler.addEventListener('mousedown', function(e){ dStart(e.clientX); });
  window.addEventListener('mousemove', function(e){ dMove(e.clientX); });
  window.addEventListener('mouseup', dEnd);

  var flash=document.getElementById('flash');
  var noteInput=document.getElementById('note');
  function logAmount(amt){ var note=noteInput.value.trim(); entries.push({amount:amt, ts:Date.now(), note:note}); saveJSON('entries', entries); noteInput.value=''; render(); flash.classList.add('show'); setTimeout(function(){ flash.classList.remove('show'); },600); if(navigator.vibrate) navigator.vibrate(15); }
  document.getElementById('logbtn').addEventListener('click', function(){ logAmount(value); });
  document.getElementById('typebtn').addEventListener('click', function(){ var v=prompt('Amount to log:'); if(v==null) return; var n=parseFloat(v); if(!isNaN(n)) logAmount(Math.round(n)); });

  function renderSlotGroup(arr, key, el){
    el.innerHTML='';
    arr.forEach(function(s, idx){
      var row=document.createElement('div'); row.className='slot';
      var name=document.createElement('input'); name.className='name'; name.value=s.name;
      name.addEventListener('input', function(){ s.name=name.value; saveJSON(key,arr); });
      var op=document.createElement('button'); op.className='op'; op.textContent=s.op;
      op.addEventListener('click', function(){ s.op=(s.op==='-'?'+':'-'); op.textContent=s.op; saveJSON(key,arr); render(); });
      var amt=document.createElement('input'); amt.className='amt'; amt.type='number'; amt.inputMode='numeric'; amt.value=s.amt;
      amt.addEventListener('input', function(){ s.amt=parseFloat(amt.value)||0; saveJSON(key,arr); render(); });
      var val=document.createElement('span'); val.className='val';
      var rm=document.createElement('button'); rm.className='rm'; rm.textContent='\u00d7';
      rm.addEventListener('click', function(){ arr.splice(idx,1); saveJSON(key,arr); renderSlotGroup(arr,key,el); render(); });
      row.appendChild(name); row.appendChild(op); row.appendChild(amt); row.appendChild(val); row.appendChild(rm);
      el.appendChild(row); s._valEl=val;
    });
  }
  function renderAllSlots(){ renderSlotGroup(slotsTop,'slotsTop',document.getElementById('slotsTop')); renderSlotGroup(slotsExtra,'slotsExtra',document.getElementById('slotsExtra')); }
  document.getElementById('addTop').addEventListener('click', function(){ slotsTop.push({name:'new',op:'-',amt:0}); saveJSON('slotsTop',slotsTop); renderAllSlots(); render(); });
  document.getElementById('addExtra').addEventListener('click', function(){ slotsExtra.push({name:'new',op:'-',amt:0}); saveJSON('slotsExtra',slotsExtra); renderAllSlots(); render(); });

  var totalEl=document.getElementById('total');
  var recentEl=document.getElementById('recent');
  function applySlots(arr,t){ arr.forEach(function(s){ var r=s.op==='-'?t-s.amt:t+s.amt; if(s._valEl) s._valEl.textContent='$'+r; }); }
  function editAmount(i){ var v=prompt('Amount:', entries[i].amount); if(v==null) return; var n=parseFloat(v); if(!isNaN(n)){ entries[i].amount=Math.round(n); saveJSON('entries',entries); render(); } }
  function editNote(i){ var v=prompt('Note:', entries[i].note||''); if(v==null) return; entries[i].note=v.trim(); saveJSON('entries',entries); render(); }

  function render(){
    var t=todayTotal(); totalEl.textContent='$'+t; applySlots(slotsTop,t); applySlots(slotsExtra,t);
    var s0=startOfToday();
    var list=entries.map(function(e,i){ return {e:e,i:i}; });
    if(!showAll) list=list.filter(function(o){ return o.e.ts>=s0; });
    list=list.slice().reverse();
    var header='<div class="rhead"><span id="toggleAll">'+(showAll?'show today only':'show all')+'</span><span>'+(showAll?'all entries':'today')+'</span></div>';
    if(list.length===0){ recentEl.innerHTML=header+'<div class="empty">Nothing logged '+(showAll?'yet':'today')+'.</div>'; }
    else {
      recentEl.innerHTML=header+list.map(function(o){
        var d=new Date(o.e.ts); var hh=('0'+d.getHours()).slice(-2), mm=('0'+d.getMinutes()).slice(-2);
        var dateStr=showAll?((d.getMonth()+1)+'/'+d.getDate()+' '):'';
        var note=o.e.note?o.e.note:'add note'; var noteCls=o.e.note?'note':'note empty';
        return '<div class="row"><span class="amt" data-edit="'+o.i+'">$'+o.e.amount+'</span><span class="'+noteCls+'" data-note="'+o.i+'">'+note+'</span><span class="time">'+dateStr+hh+':'+mm+'</span><span class="x" data-del="'+o.i+'">del</span></div>';
      }).join('');
      var tg=document.getElementById('toggleAll'); if(tg) tg.addEventListener('click', function(){ showAll=!showAll; render(); });
      recentEl.querySelectorAll('[data-edit]').forEach(function(x){ x.addEventListener('click', function(){ editAmount(parseInt(x.dataset.edit)); }); });
      recentEl.querySelectorAll('[data-note]').forEach(function(x){ x.addEventListener('click', function(){ editNote(parseInt(x.dataset.note)); }); });
      recentEl.querySelectorAll('[data-del]').forEach(function(x){ x.addEventListener('click', function(){ entries.splice(parseInt(x.dataset.del),1); saveJSON('entries',entries); render(); }); });
    }
    renderHistory();
  }

  function setupCollapser(id, chevId){
    var el=document.getElementById(id); var chev=document.getElementById(chevId);
    el.querySelector('.head').addEventListener('click', function(){ el.classList.toggle('open'); chev.textContent=el.classList.contains('open')?'hide':'show'; if(id==='history') renderHistory(); });
  }
  setupCollapser('extra','extraChev'); setupCollapser('history','histChev');

  var historyEl=document.getElementById('history');
  var historyBody=document.getElementById('historyBody');
  function dayKey(ts){ var d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
  function weekKey(ts){ var d=new Date(ts); d.setHours(0,0,0,0); var day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.getTime(); }
  function fmtDate(ts){ var d=new Date(ts); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate(); }
  function renderHistory(){
    if(!historyEl.classList.contains('open')) return;
    function group(keyFn,labelFn){ var m={}; entries.forEach(function(e){ var k=keyFn(e.ts); if(!m[k]) m[k]={sum:0,n:0}; m[k].sum+=e.amount; m[k].n++; }); var keys=Object.keys(m).sort(function(a,b){ return b-a; }); return keys.map(function(k){ return '<div class="hrow"><span>'+labelFn(parseInt(k),m[k].n)+'</span><span>$'+m[k].sum+'</span></div>'; }).join('')||'<div class="hrow"><span>No data</span><span></span></div>'; }
    var byDay=group(dayKey, function(k,n){ return fmtDate(k)+'  ('+n+')'; });
    var byWeek=group(weekKey, function(k){ return 'Week of '+fmtDate(k); });
    historyBody.innerHTML='<div class="grp-title">By day</div>'+byDay+'<div class="grp-title">By week</div>'+byWeek+'<div class="tools"><button id="exportBtn">Export CSV</button><button id="importBtn">Import CSV</button><button id="clearBtn">Clear all</button></div>';
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    document.getElementById('importBtn').addEventListener('click', function(){ document.getElementById('csvFile').click(); });
    document.getElementById('clearBtn').addEventListener('click', function(){ if(confirm('Delete ALL logged entries? This cannot be undone.')){ entries=[]; saveJSON('entries',entries); render(); } });
  }
  function csvCell(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
  function exportCSV(){ var rows=[['date','time','amount','note']]; entries.slice().sort(function(a,b){ return a.ts-b.ts; }).forEach(function(e){ var d=new Date(e.ts); rows.push([(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear(), ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2), e.amount, e.note||'']); }); var csv=rows.map(function(r){ return r.map(csvCell).join(','); }).join('\n'); var blob=new Blob([csv],{type:'text/csv'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='logger-'+APP_ID+'-export.csv'; a.click(); store('lastExport', String(Date.now())); hideReminder(); }

  function parseCSV(text){
    var rows=[], row=[], cur='', inq=false;
    for (var i=0;i<text.length;i++){
      var ch=text[i];
      if (inq){
        if (ch==='"'){ if (text[i+1]==='"'){ cur+='"'; i++; } else { inq=false; } }
        else { cur+=ch; }
      } else {
        if (ch==='"'){ inq=true; }
        else if (ch===','){ row.push(cur); cur=''; }
        else if (ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
        else if (ch==='\r'){ /* skip */ }
        else { cur+=ch; }
      }
    }
    if (cur.length || row.length){ row.push(cur); rows.push(row); }
    return rows;
  }
  function importCSV(text){
    var rows=parseCSV(text).filter(function(r){ return r.length && r.join('').trim().length; });
    if (!rows.length){ alert('That file looks empty.'); return; }
    var start=0;
    var h0=(rows[0][0]||'').toLowerCase();
    if (h0.indexOf('date')!==-1) start=1; // skip header
    var imported=[];
    for (var i=start;i<rows.length;i++){
      var r=rows[i];
      var dateStr=(r[0]||'').trim(), timeStr=(r[1]||'').trim(), amtStr=(r[2]||'').trim(), note=(r[3]||'').trim();
      var amount=parseFloat(amtStr);
      if (isNaN(amount)) continue;
      var ts=Date.parse(dateStr+' '+timeStr);
      if (isNaN(ts)) ts=Date.parse(dateStr);
      if (isNaN(ts)) ts=Date.now();
      imported.push({ amount: Math.round(amount), ts: ts, note: note });
    }
    if (!imported.length){ alert('No valid rows found. Expected columns: date, time, amount, note.'); return; }
    var msg='Found '+imported.length+' entries.\n\nOK = REPLACE all current data with this file.\nCancel = leave current data untouched.';
    if (!confirm(msg)) return;
    var seen={}; var merged=[];
    imported.forEach(function(e){ var k=e.ts+'|'+e.amount; if(!seen[k]){ seen[k]=1; merged.push(e); } });
    merged.sort(function(a,b){ return a.ts-b.ts; });
    entries=merged; saveJSON('entries', entries); render();
    alert('Imported '+entries.length+' entries.');
  }
  document.getElementById('csvFile').addEventListener('change', function(e){
    var f=e.target.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=function(){ importCSV(String(reader.result)); e.target.value=''; };
    reader.readAsText(f);
  });

  var reminderEl=document.getElementById('reminder');
  var reminderText=document.getElementById('reminderText');
  function hideReminder(){ reminderEl.classList.remove('show'); }
  function checkReminder(){
    if (!entries.length) return; // nothing to back up
    var last=store('lastExport'); var snoozed=store('remindSnooze');
    var now=Date.now(), WEEK=7*86400000;
    if (snoozed && (now - parseInt(snoozed)) < 86400000) return; // snoozed within last 24h
    var due=false, days=0;
    if (!last) { due=true; }
    else { days=Math.floor((now-parseInt(last))/86400000); if ((now-parseInt(last)) >= WEEK) due=true; }
    if (due) {
      reminderText.textContent = last
        ? ('It\u2019s been '+days+' days since your last backup.')
        : 'You haven\u2019t backed up yet. Export a CSV to be safe.';
      reminderEl.classList.add('show');
    }
  }
  document.getElementById('reminderExport').addEventListener('click', function(){ exportCSV(); });
  document.getElementById('reminderDismiss').addEventListener('click', function(){ store('remindSnooze', String(Date.now())); hideReminder(); });

  window.addEventListener('resize', sizeCanvas);
  applyBg(); renderAllSlots(); sizeCanvas(); setValue(10); render(); checkReminder();
})();
</script>
</body>
</html>
